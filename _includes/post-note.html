{% if page.note or page.chapter-link %}
<blockquote onclick="classSwitch()" class="cropped" id="note">

      {% if page.note %}
        <p class="translator-note"><b>Note:</b> {{ page.note }}</p>
      {% endif %}
  
      {% if page.chapter-link %}
        <p class="original-chapter-link"><strong style="padding-right: 6px">Source:</strong><a href="{{ page.chapter-link }}" target="_blank">{{ page.chapter-link }}</a></p>
      {% endif %}
</blockquote>
	{% else %}
		<hr>
{% endif %}
