<div class="post-content">
		{% if post.note %}
	<blockquote style="margin-top: 30px;"><b>Note:</b> {{ post.note | strip_html | newline_to_br }}</blockquote>
		{% else %}
	<p>{% assign newlines_post = post.content | strip_html | newline_to_br |  truncatewords: 37 %}{{ newlines_post | replace: "<br /> <br />", "<br />"  | replace_first: "<br...", "" }}</p>
		{% endif %}
</div>
