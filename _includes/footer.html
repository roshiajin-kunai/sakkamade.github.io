<div id="page-inner">

<section id="bottom-menu" class="inner-bottom-menu">

<div class="inner-bottom-column count-2">  
  {% for item in site.data.bottom-menu.docs %}
  <a class="{% if item.url == page.url %}active-menu{% endif %}" href="{{ item.url }}">{{ item.title }}</a>
  {% endfor %}
  <a href="{{ "/feed.xml" | relative_url }}">Subscribe via RSS</a>
</div>

<div class="inner-bottom-column count-2">
<a style="pointer-events: none; text-transform: none;">Last update on website: {{ "now" | date: "%Y-%m-%d %H:%M" }} UTC</a>
</div>

</section>

<section class="inner-footer">
<!-- skkamade 20{{ site.time | date: '%y' }} -->
</section>
</div>
